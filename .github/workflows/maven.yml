name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Sets up Java and handles Maven caching automatically
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Make Maven Wrapper Executable
      run: chmod +x mvnw

    # Compiles code and runs tests
    - name: Build and Test with Maven
      run: ./mvnw clean verify -Dno-transfer-progress
